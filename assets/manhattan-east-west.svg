<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380" role="img" aria-labelledby="ew-title ew-desc">
  <title id="ew-title">East/West designation around Fifth Avenue</title>
  <desc id="ew-desc">Manhattan house numbers begin at 1 at Fifth Avenue and grow outward by about 100 per block. 10 E 14th Street is barely east of Fifth; 200 W 57th Street is about two blocks west.</desc>

  <rect width="700" height="380" fill="#fff"/>

  <!-- Compass -->
  <text x="640" y="34" font-family="Georgia, 'Times New Roman', serif" font-size="14" font-weight="bold" fill="#000">N ↑</text>

  <!-- Faint avenue grid (2 each side of Fifth) -->
  <g stroke="#bbb" stroke-width="1" stroke-dasharray="3,3">
    <line x1="210" y1="85" x2="210" y2="320"/>
    <line x1="280" y1="85" x2="280" y2="320"/>
    <line x1="420" y1="85" x2="420" y2="320"/>
    <line x1="490" y1="85" x2="490" y2="320"/>
  </g>

  <!-- Scale labels along the top: shows house-number range at each avenue -->
  <g font-family="Georgia, 'Times New Roman', serif" font-size="11" font-style="italic" fill="#888" text-anchor="middle">
    <text x="210" y="78">~200 W</text>
    <text x="280" y="78">~100 W</text>
    <text x="350" y="78">1</text>
    <text x="420" y="78">~100 E</text>
    <text x="490" y="78">~200 E</text>
  </g>

  <!-- Fifth Avenue (the spine where numbering starts) -->
  <line x1="350" y1="85" x2="350" y2="320" stroke="#000" stroke-width="3"/>
  <text x="358" y="100" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-style="italic" fill="#000">5th Ave</text>

  <!-- 57th Street -->
  <line x1="40" y1="140" x2="660" y2="140" stroke="#000" stroke-width="1.4"/>
  <text x="48" y="133" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#000">57th Street</text>

  <!-- 14th Street -->
  <line x1="40" y1="240" x2="660" y2="240" stroke="#000" stroke-width="1.4"/>
  <text x="48" y="233" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#000">14th Street</text>

  <!-- W / E directional cues in the gutter -->
  <text x="60" y="195" font-family="Georgia, 'Times New Roman', serif" font-size="20" font-style="italic" fill="#888">←  W</text>
  <text x="600" y="195" font-family="Georgia, 'Times New Roman', serif" font-size="20" font-style="italic" fill="#888">E  →</text>

  <!-- Distance bracket from Fifth to the 200 W pin, labelled with the math -->
  <g stroke="#666" stroke-width="0.8" fill="none">
    <line x1="350" y1="158" x2="210" y2="158"/>
    <line x1="350" y1="154" x2="350" y2="162"/>
    <line x1="210" y1="154" x2="210" y2="162"/>
  </g>
  <text x="280" y="174" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-style="italic" fill="#666" text-anchor="middle">about 2 blocks west, so the number is around 200</text>

  <!-- Pin: 200 W 57th St (at the 200-block, ~2 blocks west of Fifth) -->
  <circle cx="210" cy="140" r="5" fill="#000"/>
  <text x="210" y="128" font-family="Georgia, 'Times New Roman', serif" font-size="13" text-anchor="middle" fill="#000" font-weight="bold">200 W 57th St</text>

  <!-- Pin: 10 E 14th St (barely east of Fifth) -->
  <circle cx="357" cy="240" r="5" fill="#000"/>
  <text x="365" y="237" font-family="Georgia, 'Times New Roman', serif" font-size="13" fill="#000" font-weight="bold">10 E 14th St</text>
  <text x="365" y="252" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-style="italic" fill="#666">just past 5th, so the number is small</text>

  <!-- Bottom rule -->
  <text x="350" y="355" font-family="Georgia, 'Times New Roman', serif" font-size="12" font-style="italic" fill="#444" text-anchor="middle">House numbers begin at 1 at 5th Ave and grow outward by about 100 per block.</text>
</svg>
